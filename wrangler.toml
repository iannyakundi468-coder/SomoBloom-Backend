name = "somobloom-backend"
main = "src/index.ts"
compatibility_date = "2024-11-27"
account_id = "b9a79aebae11306fcf65d0e01cce47be"

# Set up Cloudflare D1 Database binding for Production
[[d1_databases]]
binding = "DB" # Available as env.DB in the code
database_name = "somobloom_db"
database_id = "b8f09cbc-c8d0-499c-895e-2cc396b12ae6"
migrations_dir = "drizzle"

# Set up Cloudflare Workers AI binding
[ai]
binding = "AI" # Available as env.AI in the code

# Set up Cloudflare KV Namespace for media
[[kv_namespaces]]
binding = "MEDIA_KV"
id = "69aea514fbdf4646939149b46e0f8480"
preview_id = "da3c2265e4824b20b7b94a7b79153f6b"

# Set up Analytics Engine binding
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "somobloom_analytics"

# =====================================================================
# Staging Environment Configuration
# Deployed using: wrangler deploy --env staging
# =====================================================================
[env.staging]
name = "somobloom-backend-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "somobloom_db_staging"
database_id = "739ead2b-f1b8-4245-b944-971afef9fe01"
migrations_dir = "drizzle"

[env.staging.ai]
binding = "AI"

[[env.staging.kv_namespaces]]
binding = "MEDIA_KV"
id = "da3c2265e4824b20b7b94a7b79153f6b" # Uses the preview KV for staging

[[env.staging.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "somobloom_analytics_staging"



