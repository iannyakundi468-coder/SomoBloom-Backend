name = "somobloom-backend"
main = "src/index.ts"
compatibility_date = "2024-11-27"

# Set up Cloudflare D1 Database binding
[[d1_databases]]
binding = "DB" # Available as env.DB in the code
database_name = "somobloom_db"
database_id = "00000000-0000-0000-0000-000000000000" # Dummy ID for local dev

# Set up Cloudflare Workers AI binding
[ai]
binding = "AI" # Available as env.AI in the code
